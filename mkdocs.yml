site_name: SwarmCP
site_description: Local documentation site for the SwarmCP specification, examples, and engineering notes.
repo_name: cmmoran/swarmcp
repo_url: https://github.com/cmmoran/swarmcp
docs_dir: docs
site_dir: site
theme:
  name: readthedocs
extra_css:
  - stylesheets/dark.css
markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - tables
  - toc:
      permalink: true
plugins:
  - search
  - include-markdown
nav:
  - Home: index.md
  - Specification: spec.md
  - Examples:
      - Overview: examples/index.md
      - Nginx: examples/nginx.md
      - Primary: examples/primary.md
      - Primary Imported: examples/primary-imported.md
      - Local Upgrade Smoke: examples/local-upgrade-smoke.md
