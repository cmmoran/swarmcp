image: chrismoran/infamousity:jls__v1.0.6
replicas: 1
ports:
  - mode: ingress
    target: 8080
labels:
  traefik.enable: "true"
  traefik.http.routers.jls.entrypoints: websecure
  traefik.http.routers.jls.rule: {{ printf "Host(`jls.%s`)" (config_value_index "domain" 0) }}
  traefik.http.routers.jls.tls: "true"
  traefik.http.services.jls.loadbalancer.server.port: "8080"
  traefik.swarm.network: {{ runtime_value `{project}_core` }}
