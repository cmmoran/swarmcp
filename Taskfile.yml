version: "3"

vars:
  DOCS_IMAGE: '{{default "swarmcp-docs" .DOCS_IMAGE}}'
  DOCS_PORT: '{{default "8000" .DOCS_PORT}}'

tasks:
  docs:image:
    desc: Build the local docs image
    cmds:
      - docker build --network host -f contrib/docs/Dockerfile -t {{.DOCS_IMAGE}} .

  docs:serve:
    desc: Serve the docs site locally with Docker
    deps:
      - docs:image
    cmds:
      - docker run --rm -it -p {{.DOCS_PORT}}:8000 -v "$PWD:/site" -w /site {{.DOCS_IMAGE}} serve -a 0.0.0.0:8000

  docs:build:
    desc: Build the docs site strictly with Docker
    deps:
      - docs:image
    cmds:
      - docker run --rm -v "$PWD:/site" -w /site {{.DOCS_IMAGE}} build --strict
